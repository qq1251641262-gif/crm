<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景圆形渐变 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1677ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0958d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- 字母 C - 代表 CRM -->
  <path d="M 20 16 A 16 16 0 1 0 20 48 L 24 48 A 12 12 0 1 1 24 16 Z" fill="#ffffff"/>
  
  <!-- 内部连接点 - 代表客户/关系/管理 -->
  <circle cx="36" cy="24" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="42" cy="32" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="36" cy="40" r="4" fill="#ffffff" opacity="0.95"/>
  
  <!-- 连接线 -->
  <line x1="38" y1="26" x2="40" y2="30" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
  <line x1="40" y1="34" x2="38" y2="38" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
  
  <!-- 光晕效果 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</svg>
